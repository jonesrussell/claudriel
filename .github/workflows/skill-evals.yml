name: Skill Evals

on:
  pull_request:
    paths:
      - '.claude/skills/**'
      - 'src/Provider/*ServiceProvider.php'
      - 'src/Entity/*.php'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  deterministic:
    name: Deterministic Eval Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run deterministic evals
        working-directory: ${{ github.workspace }}
        run: python agent/eval_runner.py --deterministic --markdown

  schema-contracts:
    name: Schema Contract Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Validate skill-schema contracts
        working-directory: ${{ github.workspace }}
        run: python agent/eval_contracts.py

  llm-judge:
    name: LLM Judge Evaluation
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run LLM judge evals
        working-directory: ${{ github.workspace }}
        run: python agent/eval_runner.py --llm-judge --output eval-results.json --markdown

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: eval-results.json
          retention-days: 90
