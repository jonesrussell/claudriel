schema_version: "1.0"
skill: commitment
entity_type: commitment
eval_type: trajectory
max_turns: 10
subject_model: sonnet
judge_model: haiku

tests:
  - name: full-crud-lifecycle
    description: "Create, list, update, delete a commitment"
    turns:
      - input: "I owe Sarah a proposal by Friday"
        operation: create
        assertions:
          - type: graphql_operation
            operation: createCommitment
          - type: confirmation_shown
          - type: direction_detected
            direction: outbound
        mock_response:
          createCommitment:
            uuid: "test-001"
            title: "Send proposal to Sarah"
            direction: outbound
            status: active

      - input: "show my commitments"
        operation: list
        assertions:
          - type: graphql_operation
            operation: commitmentList
            mutation: false
        mock_response:
          commitmentList:
            items:
              - uuid: "test-001"
                title: "Send proposal to Sarah"
                direction: outbound
                status: active

      - input: "mark the proposal as complete"
        operation: update
        assertions:
          - type: resolve_first
          - type: before_after_shown
          - type: graphql_operation
            operation: updateCommitment
        mock_response:
          updateCommitment:
            uuid: "test-001"
            status: completed

      - input: "delete the proposal commitment"
        operation: delete
        assertions:
          - type: resolve_first
          - type: echo_back_required
            field: title
          - type: graphql_operation
            operation: deleteCommitment
        mock_response:
          deleteCommitment:
            success: true

    rubric: commitment
    tags: [trajectory, lifecycle]
