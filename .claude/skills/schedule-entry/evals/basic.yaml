# Schedule Entry CRUD Eval
# Tests GraphQL-based schedule entry lifecycle operations

schema_version: "1.0"
skill: schedule-entry
entity_type: schedule_entry

tests:
  # === CREATE ===

  - name: create-call-with-time
    operation: create
    input: "schedule a call with Sarah at 3pm"
    assertions:
      - type: field_extraction
        field: title
        should_match: "Call with Sarah"
        must_not_equal: "schedule a call with Sarah at 3pm"
      - type: field_extraction
        field: starts_at
        should_match: "today 3pm in ISO 8601"
      - type: field_extraction
        field: ends_at
        should_match: "starts_at + 1 hour"
      - type: confirmation_shown
      - type: graphql_operation
        operation: createScheduleEntry
      - type: no_file_operations

  - name: create-conjunction-title
    operation: create
    input: "add standup and retro to my schedule tomorrow at 10am"
    assertions:
      - type: field_extraction
        field: title
        should_match: "Standup and Retro"
      - type: no_conjunction_split
      - type: field_extraction
        field: starts_at
        should_match: "tomorrow ISO 8601 date"
      - type: confirmation_shown
    tags: [edge-case]

  - name: create-explicit-time-range
    operation: create
    input: "book a dentist appointment on Friday from 2pm to 3:30pm"
    assertions:
      - type: field_extraction
        field: title
        should_match: "Dentist Appointment"
      - type: field_extraction
        field: starts_at
        should_match: "next Friday 2pm ISO 8601"
      - type: field_extraction
        field: ends_at
        should_match: "next Friday 3:30pm ISO 8601"
      - type: graphql_operation
        operation: createScheduleEntry

  - name: create-missing-title-and-time
    operation: create
    input: "schedule something for next Monday"
    context:
      notes: "User provides a date but no title or time"
    assertions:
      - type: asks_for_field
        field: title
      - type: field_extraction
        field: title
        must_not_equal: "something"
    tags: [edge-case]

  # === LIST ===

  - name: list-all-schedule
    operation: list
    input: "show my schedule"
    assertions:
      - type: graphql_operation
        operation: scheduleEntryList
        mutation: false
      - type: table_presented
        columns: [title, starts_at, ends_at, status]
      - type: no_file_operations

  - name: list-filtered-by-week
    operation: list
    input: "what's on my calendar this week?"
    assertions:
      - type: graphql_operation
        operation: scheduleEntryList
        mutation: false
      - type: filter_applied
        field: starts_at
        value: "current week"
      - type: table_presented
        columns: [title, starts_at, ends_at, status]

  # === UPDATE ===

  - name: update-reschedule-by-title
    operation: update
    input: "reschedule the dentist to Thursday at 4pm"
    context:
      existing_entities:
        - uuid: "abc-123"
          fields:
            title: "Dentist Appointment"
            starts_at: "Friday 2pm"
    assertions:
      - type: resolve_first
      - type: before_after_shown
      - type: graphql_operation
        operation: updateScheduleEntry

  - name: update-conjunction-resolve
    operation: update
    input: "move the standup and retro to Wednesday"
    context:
      existing_entities:
        - uuid: "def-456"
          fields:
            title: "Standup and Retro"
    assertions:
      - type: resolve_first
      - type: no_conjunction_split
      - type: before_after_shown
      - type: graphql_operation
        operation: updateScheduleEntry
    tags: [edge-case]

  - name: update-cancel-as-status-change
    operation: update
    input: "cancel the call with Sarah"
    context:
      existing_entities:
        - uuid: "ghi-789"
          fields:
            title: "Call with Sarah"
            status: "confirmed"
    assertions:
      - type: resolve_first
      - type: before_after_shown
      - type: graphql_operation
        operation: updateScheduleEntry
    tags: [regression]

  - name: update-add-notes
    operation: update
    input: "add notes to the dentist: bring insurance card"
    context:
      existing_entities:
        - uuid: "abc-123"
          fields:
            title: "Dentist Appointment"
    assertions:
      - type: resolve_first
      - type: field_extraction
        field: notes
        should_match: "bring insurance card"
      - type: graphql_operation
        operation: updateScheduleEntry

  # === DELETE ===

  - name: delete-conjunction-entry
    operation: delete
    input: "delete the standup and retro"
    context:
      existing_entities:
        - uuid: "def-456"
          fields:
            title: "Standup and Retro"
    assertions:
      - type: resolve_first
      - type: no_conjunction_split
      - type: confirmation_shown
      - type: echo_back_required
        field: title
      - type: graphql_operation
        operation: deleteScheduleEntry

  - name: delete-ambiguous-match
    operation: delete
    input: "remove the old meeting"
    context:
      existing_entities:
        - uuid: "aaa"
          fields:
            title: "Team Meeting"
        - uuid: "bbb"
          fields:
            title: "Client Meeting"
    assertions:
      - type: resolve_first
      - type: disambiguation

  # === CANCEL VS DELETE DISTINCTION ===

  - name: update-cancel-preserves-history
    operation: update
    input: "cancel my Friday appointment"
    context:
      existing_entities:
        - uuid: "abc-123"
          fields:
            title: "Dentist Appointment"
            starts_at: "Friday"
    assertions:
      - type: resolve_first
      - type: graphql_operation
        operation: updateScheduleEntry
      - type: confirmation_shown
    tags: [regression]

  - name: delete-explicit-delete
    operation: delete
    input: "delete my Friday appointment"
    context:
      existing_entities:
        - uuid: "abc-123"
          fields:
            title: "Dentist Appointment"
            starts_at: "Friday"
    assertions:
      - type: resolve_first
      - type: echo_back_required
        field: title
      - type: graphql_operation
        operation: deleteScheduleEntry
    tags: [regression]

  # === RELATIVE DATE HANDLING ===

  - name: create-relative-hours
    operation: create
    input: "schedule lunch in 2 hours"
    assertions:
      - type: field_extraction
        field: title
        should_match: "Lunch"
      - type: field_extraction
        field: starts_at
        should_match: "current time + 2 hours ISO 8601"
      - type: field_extraction
        field: ends_at
        should_match: "starts_at + 1 hour"
      - type: confirmation_shown

  - name: create-recurring-intent
    operation: create
    input: "add team standup every day at 9am starting next Monday"
    assertions:
      - type: field_extraction
        field: title
        should_match: "Team Standup"
      - type: field_extraction
        field: starts_at
        should_match: "next Monday 9am ISO 8601"
      - type: graphql_operation
        operation: createScheduleEntry

  # === INTENT PARSING EDGE CASES ===

  - name: create-secondary-intent
    operation: create
    input: "schedule a meeting and also set a commitment"
    assertions:
      - type: field_extraction
        field: title
        must_not_equal: "schedule a meeting and also set a commitment"
        should_match: "Meeting"
      - type: secondary_intent_queued
        intent: "set a commitment"
    tags: [edge-case]

  - name: update-recent-entry-resolve
    operation: update
    input: "update the entry I just added"
    context:
      existing_entities:
        - uuid: "lwd-001"
          fields:
            title: "Lunch with Dave"
      notes: "Only one entry was created recently"
    assertions:
      - type: resolve_first
      - type: asks_for_field
        field: title

  # === ERROR HANDLING ===

  - name: delete-no-match
    operation: delete
    input: "delete the yoga class"
    context:
      notes: "No schedule entry with 'yoga' in the title exists"
    assertions:
      - type: resolve_first
      - type: error_surfaced
      - type: offers_alternative
        alternative: create
    tags: [error-handling]

  - name: update-invalid-date
    operation: update
    input: "reschedule the meeting to blurgsday"
    context:
      existing_entities:
        - uuid: "aaa"
          fields:
            title: "Team Meeting"
    assertions:
      - type: resolve_first
      - type: error_surfaced
    tags: [error-handling]

  - name: create-vague-time
    operation: create
    input: "schedule a call at sometime maybe"
    assertions:
      - type: field_extraction
        field: title
        should_match: "Call"
      - type: error_surfaced
      - type: asks_for_field
        field: starts_at
    tags: [error-handling]
